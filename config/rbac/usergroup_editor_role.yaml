# This rule is not used by the project sing-box-operator-2 itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the singboxoperator.shlande.top.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: sing-box-operator-2
    app.kubernetes.io/managed-by: kustomize
  name: usergroup-editor-role
rules:
- apiGroups:
  - singboxoperator.shlande.top
  resources:
  - usergroups
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - singboxoperator.shlande.top
  resources:
  - usergroups/status
  verbs:
  - get
