name: Tests

on:
  push:
  pull_request:

permissions: {}

jobs:
  test:
    permissions:
      contents: read
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version-file: go.mod

      - name: Running Tests
        run: |
          go mod tidy
          make test
