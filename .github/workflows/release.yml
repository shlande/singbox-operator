name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker-amd64:
    name: Build and Push Docker Image (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Clone the code
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Log in to the Container registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels only) for Docker
        id: meta
        uses: docker/metadata-action@v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image (amd64)
        id: build-push
        uses: docker/build-push-action@v6.16.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-amd64
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

  docker-arm64:
    name: Build and Push Docker Image (arm64)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Clone the code
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Log in to the Container registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels only) for Docker
        id: meta
        uses: docker/metadata-action@v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image (arm64)
        id: build-push
        uses: docker/build-push-action@v6.16.0
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-arm64
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64

  docker-manifest:
    name: Create and Push Multi-Arch Manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs:
      - docker-amd64
      - docker-arm64
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Strip pre-release suffix to get MAJOR.MINOR and MAJOR (only for stable releases)
          STABLE="${VERSION%%-*}"
          MAJOR_MINOR="${STABLE%.*}"
          MAJOR="${STABLE%%.*}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$([[ "${VERSION}" == *-* ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "major_minor=${MAJOR_MINOR}" >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"

      - name: Create and push multi-arch manifest
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          VERSION="${{ steps.version.outputs.version }}"
          IS_PRERELEASE="${{ steps.version.outputs.is_prerelease }}"
          MAJOR_MINOR="${{ steps.version.outputs.major_minor }}"
          MAJOR="${{ steps.version.outputs.major }}"

          # Always create the exact version manifest
          docker buildx imagetools create \
            --tag "${IMAGE}:${VERSION}" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"

          # Only add floating MAJOR.MINOR and MAJOR tags for stable releases
          if [[ "${IS_PRERELEASE}" == "false" ]]; then
            docker buildx imagetools create \
              --tag "${IMAGE}:${MAJOR_MINOR}" \
              --tag "${IMAGE}:${MAJOR}" \
              "${IMAGE}:${VERSION}-amd64" \
              "${IMAGE}:${VERSION}-arm64"
          fi

  helm:
    name: Package and Push Helm Chart
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    needs: docker-manifest
    steps:
      - name: Clone the code
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@v4.3.0
        with:
          version: latest

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Update Chart.yaml version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version:.*/version: ${VERSION}/" charts/singbox-operator/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/singbox-operator/Chart.yaml

      - name: Update image tag in values.yaml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s|tag:.*|tag: \"${VERSION}\"|" charts/singbox-operator/values.yaml || true

      - name: Log in to the Container registry (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Package Helm chart
        run: |
          helm package charts/singbox-operator \
            --version "${{ steps.version.outputs.version }}" \
            --app-version "${{ steps.version.outputs.version }}" \
            --destination /tmp/helm-packages

      - name: Push Helm chart to OCI registry
        run: |
          helm push /tmp/helm-packages/singbox-operator-${{ steps.version.outputs.version }}.tgz \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

      - name: Upload Helm chart as release artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: helm-chart-${{ steps.version.outputs.version }}
          path: /tmp/helm-packages/singbox-operator-${{ steps.version.outputs.version }}.tgz
          retention-days: 90

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - docker-manifest
      - helm
    steps:
      - name: Clone the code
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download Helm chart artifact
        uses: actions/download-artifact@v4.3.0
        with:
          name: helm-chart-${{ steps.version.outputs.version }}
          path: /tmp/helm-packages

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.2.2
        with:
          generate_release_notes: true
          files: |
            /tmp/helm-packages/singbox-operator-${{ steps.version.outputs.version }}.tgz
          body: |
            ## Docker Image

            ```
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ```

            ## Helm Chart (OCI)

            ```bash
            helm install singbox-operator \
              oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/singbox-operator \
              --version ${{ steps.version.outputs.version }}
            ```
