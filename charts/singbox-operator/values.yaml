# Default values for singbox-operator

operator:
  image:
    repository: ghcr.io/shlande/singbox-operator
    tag: "0.2.4"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # Metrics port
  metricsPort: 8080
  # Health probe port
  healthProbePort: 8081

# Webhook configuration
webhook:
  enabled: true
  port: 9443

# cert-manager integration for webhook TLS
certManager:
  enabled: true
  # If true, a SelfSigned Issuer is created automatically in the release namespace.
  # Set to false if you already have an Issuer/ClusterIssuer you want to reuse.
  createIssuer: true
  # Issuer name. When createIssuer=true this is auto-set to "<fullname>-selfsigned-issuer".
  # When createIssuer=false, provide the name of your existing Issuer/ClusterIssuer.
  issuerName: ""
  issuerKind: "Issuer"

# Default values injected by MutatingWebhook
defaults:
  relayPort: 10808
  relayProtocol: socks5
  protocols:
    vless: 10443
    trojan: 10444
    socks5: 10808
    http: 10080

# sing-box runtime configuration
singbox:
  image: "ghcr.io/sagernet/sing-box:latest"
  # Default TLS Secret name for protocols requiring TLS (e.g. hysteria2).
  # Must be a kubernetes.io/tls Secret in the same namespace as the ProxyNode.
  # Override per-node via spec.tlsSecretName.
  defaultTLSSecret: "sing-box-tls"

# Namespace to watch (empty = all namespaces)
watchNamespace: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

nameOverride: ""
fullnameOverride: ""

# Usage collector — polls sing-box v2rayapi and writes traffic records to Elasticsearch
usageCollector:
  enabled: false
  pollInterval: "30s"
  nodeTimeout: "10s"
  elasticsearch:
    endpoint: ""
    dataStream: "usage-traffic"
    # API key — reference a Secret instead of inlining the value.
    # Set existingSecret to use a pre-existing Secret, or apiKey for a plain-text value (not recommended for production).
    apiKey: ""
    existingSecret: ""          # name of an existing Secret
    existingSecretKey: "api-key" # key inside the Secret
  checkpointPath: "/var/lib/usage-collector/checkpoint.json"
  maxBufferSize: 10000
  shutdownTimeout: "30s"
  # Storage for the checkpoint file. Must be writable (not subject to readOnlyRootFilesystem).
  checkpointVolume:
    enabled: true
    # emptyDir is the default. Override with a PVC name for persistence across pod restarts.
    emptyDir: {}
    # existingClaim: ""
