apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "singbox-operator.fullname" . }}-node-reader-binding
  labels:
    {{- include "singbox-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "singbox-operator.fullname" . }}-node-reader
subjects:
- kind: ServiceAccount
  name: {{ include "singbox-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
