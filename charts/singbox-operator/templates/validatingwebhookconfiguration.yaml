{{- if .Values.webhook.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "singbox-operator.fullname" . }}-validating-webhook-configuration
  labels:
    {{- include "singbox-operator.labels" . | nindent 4 }}
  {{- if .Values.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "singbox-operator.fullname" . }}-webhook-server-cert
  {{- end }}
webhooks:
- name: vsingboxnode.kb.io
  admissionReviewVersions: ["v1"]
  clientConfig:
    service:
      name: {{ include "singbox-operator.fullname" . }}-webhook-service
      namespace: {{ .Release.Namespace }}
      path: /validate-singboxoperator-shlande-top-v1alpha1-singboxnode
  failurePolicy: Fail
  rules:
  - apiGroups: ["singboxoperator.shlande.top"]
    apiVersions: ["v1alpha1"]
    operations: ["CREATE", "UPDATE"]
    resources: ["singboxnodes"]
  sideEffects: None
- name: vuser.kb.io
  admissionReviewVersions: ["v1"]
  clientConfig:
    service:
      name: {{ include "singbox-operator.fullname" . }}-webhook-service
      namespace: {{ .Release.Namespace }}
      path: /validate-singboxoperator-shlande-top-v1alpha1-user
  failurePolicy: Fail
  rules:
  - apiGroups: ["singboxoperator.shlande.top"]
    apiVersions: ["v1alpha1"]
    operations: ["CREATE", "UPDATE"]
    resources: ["users"]
  sideEffects: None
- name: vcustomroute.kb.io
  admissionReviewVersions: ["v1"]
  clientConfig:
    service:
      name: {{ include "singbox-operator.fullname" . }}-webhook-service
      namespace: {{ .Release.Namespace }}
      path: /validate-singboxoperator-shlande-top-v1alpha1-customroute
  failurePolicy: Fail
  rules:
  - apiGroups: ["singboxoperator.shlande.top"]
    apiVersions: ["v1alpha1"]
    operations: ["CREATE", "UPDATE"]
    resources: ["customroutes"]
  sideEffects: None
{{- end }}
