apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "singbox-operator.fullname" . }}-controller-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "singbox-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      {{- include "singbox-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "singbox-operator.selectorLabels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 60
      serviceAccountName: {{ include "singbox-operator.serviceAccountName" . }}
      containers:
      - name: manager
        image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag }}"
        imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
        args:
        - --leader-elect
        - --metrics-bind-address=:{{ .Values.operator.metricsPort }}
        - --health-probe-bind-address=:{{ .Values.operator.healthProbePort }}
        - --default-tls-secret={{ .Values.singbox.defaultTLSSecret }}
        {{- if .Values.usageCollector.enabled }}
        - --usage-collect-enabled=true
        - --usage-poll-interval={{ .Values.usageCollector.pollInterval }}
        - --usage-node-timeout={{ .Values.usageCollector.nodeTimeout }}
        - --usage-es-endpoint={{ .Values.usageCollector.elasticsearch.endpoint }}
        - --usage-es-data-stream={{ .Values.usageCollector.elasticsearch.dataStream }}
        - --usage-checkpoint-path={{ .Values.usageCollector.checkpointPath }}
        - --usage-max-buffer-size={{ .Values.usageCollector.maxBufferSize }}
        - --usage-shutdown-timeout={{ .Values.usageCollector.shutdownTimeout }}
        {{- if .Values.usageCollector.elasticsearch.apiKey }}
        - --usage-es-api-key={{ .Values.usageCollector.elasticsearch.apiKey }}
        {{- else if .Values.usageCollector.elasticsearch.existingSecret }}
        - --usage-es-api-key=$(USAGE_ES_API_KEY)
        {{- end }}
        {{- end }}
        ports:
        - name: metrics
          containerPort: {{ .Values.operator.metricsPort }}
          protocol: TCP
        - name: health
          containerPort: {{ .Values.operator.healthProbePort }}
          protocol: TCP
        {{- if .Values.webhook.enabled }}
        - name: webhook
          containerPort: {{ .Values.webhook.port }}
          protocol: TCP
        {{- end }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: {{ .Values.operator.healthProbePort }}
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: {{ .Values.operator.healthProbePort }}
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- toYaml .Values.operator.resources | nindent 10 }}
        {{- if and .Values.usageCollector.enabled .Values.usageCollector.elasticsearch.existingSecret }}
        env:
        - name: USAGE_ES_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.usageCollector.elasticsearch.existingSecret }}
              key: {{ .Values.usageCollector.elasticsearch.existingSecretKey }}
        {{- end }}
        volumeMounts:
        {{- if .Values.webhook.enabled }}
        - name: webhook-certs
          mountPath: /tmp/k8s-webhook-server/serving-certs
          readOnly: true
        {{- end }}
        {{- if .Values.usageCollector.enabled }}
        - name: usage-checkpoint
          mountPath: /var/lib/usage-collector
        {{- end }}
      volumes:
      {{- if .Values.webhook.enabled }}
      - name: webhook-certs
        secret:
          secretName: {{ include "singbox-operator.fullname" . }}-webhook-server-cert
      {{- end }}
      {{- if .Values.usageCollector.enabled }}
      - name: usage-checkpoint
        {{- if .Values.usageCollector.checkpointVolume.existingClaim }}
        persistentVolumeClaim:
          claimName: {{ .Values.usageCollector.checkpointVolume.existingClaim }}
        {{- else }}
        emptyDir: {{ toYaml .Values.usageCollector.checkpointVolume.emptyDir | nindent 10 }}
        {{- end }}
      {{- end }}
