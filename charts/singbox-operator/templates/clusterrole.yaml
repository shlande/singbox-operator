apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "singbox-operator.fullname" . }}-node-reader
  labels:
    {{- include "singbox-operator.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["singboxoperator.shlande.top"]
  resources: ["singboxnodes", "users", "customroutes"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["singboxoperator.shlande.top"]
  resources: ["singboxnodes/status", "users/status", "customroutes/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: ["singboxoperator.shlande.top"]
  resources: ["singboxnodes/finalizers", "users/finalizers", "customroutes/finalizers"]
  verbs: ["update"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["configmaps", "services", "secrets", "events"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["events.k8s.io"]
  resources: ["events"]
  verbs: ["create", "patch"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
