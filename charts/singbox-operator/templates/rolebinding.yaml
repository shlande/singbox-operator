apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "singbox-operator.fullname" . }}-manager-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "singbox-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "singbox-operator.fullname" . }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ include "singbox-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
