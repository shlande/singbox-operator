apiVersion: proxy.proxy.io/v1alpha1
kind: ProxyNode
metadata:
  name: inbound-us-west-1
  namespace: default
spec:
  nodeRef: k8s-node-1
  address: "1.2.3.4"
  region: us-west
  roles: [inbound]
  supportedProtocols:
    - protocol: vless
      port: 10443
  relayPort: 10808
  relayProtocol: socks5
